sonar.projectKey=my-nextjs-project
sonar.projectName=My Next.js Project
sonar.sourceEncoding=UTF-8

# Point to your source code
sonar.sources=./src

# Exclude Next.js build folders, dependencies, and test files
sonar.exclusions=node_modules/**, .next/**, out/**, coverage/**, **/*.test.*, **/*.spec.*, public/**

# Tell SonarQube where your test files are located
sonar.tests=./
sonar.test.inclusions=**/*.test.*, **/*.spec.*
sonar.test.exclusions=node_modules/**, .next/**

# ENSURE ONLY ERROR LOGS ARE VISIBLE
sonar.log.level=ERROR